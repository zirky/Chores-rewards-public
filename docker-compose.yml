# chores-rewards – lokální spuštění
# Zkopíruj .env.example → .env a vyplň hodnoty před prvním spuštěním.

services:

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # SQLite databáze přežije restart
    env_file: .env
    restart: unless-stopped

  # ── Frontend (Vue 3 / Vite dev server) ────────────────────────────────────
  # Pro produkci nahraď `vite` příkazem `vite build` a servuj přes nginx.
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules   # ← node_modules zůstane v Dockeru (rychlé!)
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:   # anonymní Docker volume – rychlý Linux filesystem
